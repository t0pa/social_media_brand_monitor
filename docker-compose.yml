services:
  web:
    build: .
    container_name: apple-brand-dashboard
    ports:
      - "8050:8050"
    environment:
      MONGO_URI: mongodb://db:27017
      MONGO_DB: brand_monitor
      MONGO_COLLECTION: apple_mentions
      PORT: 8050
    depends_on:
      - db

  db:
    image: mongo:7
    container_name: apple-brand-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:

